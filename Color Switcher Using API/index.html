<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
     <title>Color Switcher Project</title>
</head>
<body>
     <main>
          <h1 class="h1">Color Switcher</h1>
          <div class="content">
               <button id="randomBtn">Random Button</button>
               <input type="text" id="input" placeholder="Enter a Color">
               <button id="apply">Apply Button</button>
          </div>
          <p id="cValueP">Current Color: <span id="span"></span></p>
     </main>
     <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
     <script src="script.js"></script>
</body>
</html>
