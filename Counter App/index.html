<head>

     <title>Counter App</title>
</head>
<body>
     <div class="container">
          <div id="top">
               <p style="font-size: 20px;"><a href="./index.html" style="text-decoration: none; color: black;">Home</a></p>

               <a href="https://github.com/wasifashraf01/Projects">
                    <i class="fa-brands fa-github" style="font-size: 25px; text-decoration: none; color: black;"></i>

          </div>
          <main>
               <h2 id="count">0</h2>
               <div class="btns">
                    <button id="add" class="btn">+</button>

               </div>
               <p>Increment/Decrement by:<input type="number" id="nums" min="1" value="1"></p>
               <button id="reset">Reset</button>
          </main>
     </div>
